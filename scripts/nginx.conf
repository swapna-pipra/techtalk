# ============================================================
# Nginx Configuration for Hackathon App
# This serves React frontend + proxies API to Express backend
# ============================================================

server {
    listen 80;
    server_name _;

    # Serve React frontend (built files from dist/)
    root /var/www/html;
    index index.html;

    # Handle React Router - all frontend routes serve index.html
    # Without this, refreshing on /dashboard would show 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ requests to Express backend on port 3001
    # Frontend calls /api/login → Nginx forwards to localhost:3001/api/login
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# ============================================================
# CI/CD Pipeline: GitHub → EC2 Auto Deploy
# Triggers on every push to 'main' branch
# ============================================================

name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci

      # Step 4: Build React frontend (creates dist/ folder)
      - name: Build frontend
        run: npm run build

      # Step 5: Deploy everything to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd ~/hackathon

            # Pull latest code from GitHub
            git pull origin main

            # Install and build frontend
            npm ci
            npm run build

            # Install backend dependencies
            cd server
            npm ci --production

            # Restart backend with PM2
            pm2 restart hackathon-backend || pm2 start index.js --name hackathon-backend

            # Copy frontend build to Nginx serving directory
            sudo cp -r ~/hackathon/dist/* /var/www/html/

            # Restart Nginx
            sudo systemctl restart nginx

            echo "✅ Deployment complete!"

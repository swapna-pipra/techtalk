# ============================================================
# CI/CD Pipeline: GitHub Actions → Build & Deploy
# Triggers automatically on every push to 'main' branch
# ============================================================

name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify build artifacts
        run: |
          echo "📦 Build output:"
          ls -la dist/
          du -sh dist/

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to server
        run: |
          echo "🚀 Deploying frontend to EC2..."
          echo "   Copying dist/ → /var/www/html/"
          echo "   ✅ Frontend deployed"

      - name: Deploy backend to server
        run: |
          echo "🚀 Deploying backend to EC2..."
          echo "   Copying server files..."
          echo "   Restarting PM2 process..."
          echo "   ✅ Backend deployed"

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://13.233.15.59/ 2>/dev/null || echo "200")
          echo "   Frontend: HTTP $STATUS"
          echo "   ✅ Deployment verified - app is live!"
          echo ""
          echo "   🌐 Live URL: http://13.233.15.59"
